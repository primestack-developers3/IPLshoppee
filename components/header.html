<style>
  :root {
    --primary: #2563eb;
    --primary-hover: #1d4ed8;
    --bg-dark: rgba(10, 10, 12, 0.95);
    --glass: rgba(255, 255, 255, 0.1);
    --text: #f1f5f9;
  }

  /* --- Navigation Body --- */
  .iplpro-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    background: var(--bg-dark);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--glass);
    padding: 0.6rem 2rem;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
  }

  .iplpro-header-content {
    max-width: 1300px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  /* --- Logo --- */
  .iplpro-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: white;
    font-weight: 800;
    font-size: 1.2rem;
  }

  .iplpro-logo-icon {
    background: linear-gradient(135deg, var(--primary), #60a5fa);
    padding: 8px;
    border-radius: 12px;
    box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
  }

  /* --- Navigation Links --- */
  .iplpro-nav {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .nav-item {
    color: var(--text);
    text-decoration: none;
    padding: 0.6rem 1.2rem;
    border-radius: 8px;
    font-weight: 600;
    font-size: 0.9rem;
    transition: 0.3s;
  }

  .nav-item:hover {
    background: var(--glass);
    color: white;
  }

  /* --- PURE CSS DROPDOWN (The "Great Looking" Part) --- */
  .dropdown {
    position: relative;
    display: inline-block;
  }

  .dropbtn {
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .dropdown-content {
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: #0f172a;
    border: 1px solid var(--glass);
    border-radius: 16px;
    min-width: 450px; /* Wider for a grid look */
    padding: 1.2rem;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
  }

  /* Show dropdown on hover */
  .dropdown:hover .dropdown-content {
    opacity: 1;
    visibility: visible;
    transform: translateX(-50%) translateY(0);
  }

  .team-card {
    display: flex;
    align-items: center;
    padding: 10px;
    text-decoration: none;
    color: var(--text);
    background: rgba(255,255,255,0.03);
    border: 1px solid transparent;
    border-radius: 10px;
    transition: 0.2s;
    font-size: 0.85rem;
    font-weight: 500;
  }

  .team-card:hover {
    background: var(--primary);
    color: white;
    transform: translateY(-2px);
  }

  /* --- Cart Button --- */
  .cart-trigger {
    background: var(--primary);
    color: white;
    border: none;
    padding: 0.6rem 1.2rem;
    border-radius: 10px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: 0.3s;
  }

  .cart-trigger:hover {
    background: var(--primary-hover);
    box-shadow: 0 0 15px rgba(37, 99, 235, 0.4);
  }

  /* --- Mobile Support --- */
  @media (max-width: 850px) {
    .iplpro-nav { display: none; } /* Use a hamburger menu for true mobile */
  }
</style>

<header class="iplpro-header">
  <div class="iplpro-header-content">
    
    <a href="home.html" class="iplpro-brand">
      <span class="iplpro-logo-icon">🏏</span>
      <span>IPL <span style="color: #3b82f6;">PRO</span></span>
    </a>

    <nav class="iplpro-nav">
      <a href="home.html" class="nav-item">Home</a>

      <div class="dropdown">
        <button class="nav-item dropbtn">
          🏆 Teams <span style="font-size: 0.7rem; opacity: 0.7;">▼</span>
        </button>
        <div class="dropdown-content">
          <a href="IPL teams/csk.html" class="team-card">🦁 Chennai Super Kings</a>
          <a href="IPL teams/rcb.html" class="team-card">🐅 Royal Challengers Bangalore</a>
          <a href="IPL teams/mi.html" class="team-card">🌀 Mumbai Indians</a>
          <a href="IPL teams/kkr.html" class="team-card">⚔️ Kolkata Knight Riders</a>
          <a href="IPL teams/rr.html" class="team-card">🏰 Rajasthan Royals</a>
          <a href="IPL teams/srh.html" class="team-card">🦅 Sunrisers Hyderabad</a>
          <a href="IPL teams/gt.html" class="team-card">⚡ Gujarat Titans</a>
          <a href="IPL teams/lsg.html" class="team-card">🕊️ Lucknow Super Giants</a>
          <a href="IPL teams/dc.html" class="team-card">🐅 Delhi Capitals</a>
          <a href="IPL teams/pbks.html" class="team-card">🦁 Punjab Kings</a>
        </div>
      </div>
    </nav>

    <div class="iplpro-actions">
      <a href="cart.html">
        <button class="cart-trigger" >
          <span>🛒</span>
          <span>Cart</span>
        </button>
      </a>
    </div>

  </div>
</header>
