<style>
  :root {
    --bg: rgba(8, 12, 11, 0.95);
    --panel: rgba(20, 33, 29, 0.92);
    --border: rgba(212, 175, 55, 0.18);
    --accent: #d4af37;
    --accent-strong: #f3e8c1;
    --text: #f8f3e9;
    --muted: rgba(248, 243, 233, 0.65);
  }

  .reyval-header {
    position: fixed;
    inset: 0 0 auto;
    z-index: 1000;
    background: var(--bg);
    backdrop-filter: blur(22px);
    border-bottom: 1px solid rgba(212, 175, 55, 0.14);
    padding: 1rem 2rem;
    font-family: 'Space Grotesk', sans-serif;
  }

  .reyval-header-inner {
    max-width: 1300px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }

  .reyval-brand {
    display: flex;
    align-items: center;
    gap: 0.85rem;
    color: var(--text);
    text-decoration: none;
    font-weight: 900;
    font-size: 1.15rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .reyval-logo {
    width: 3rem;
    height: 3rem;
    display: grid;
    place-items: center;
    border-radius: 1rem;
    background: radial-gradient(circle at top left, rgba(212,175,55,0.35), transparent 45%),
                linear-gradient(135deg, rgba(255,255,255,0.12), rgba(255,255,255,0.02));
    color: #040604;
    font-size: 1.4rem;
  }

  .reyval-nav {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex-wrap: wrap;
  }

  .nav-item {
    color: var(--text);
    text-decoration: none;
    padding: 0.8rem 1rem;
    border-radius: 999px;
    transition: background-color 0.25s ease, color 0.25s ease;
    font-size: 0.9rem;
    font-weight: 600;
  }

  .nav-item:hover {
    background: rgba(212, 175, 55, 0.12);
    color: var(--accent-strong);
  }

  .cart-button {
    background: linear-gradient(135deg, rgba(212,175,55,0.9), rgba(243,232,193,0.95));
    color: #070b08;
    border: none;
    padding: 0.9rem 1.2rem;
    border-radius: 999px;
    cursor: pointer;
    font-weight: 800;
    display: inline-flex;
    align-items: center;
    gap: 0.65rem;
    position: relative;
    box-shadow: 0 15px 35px rgba(212, 175, 55, 0.16);
  }

  .cart-button:hover {
    transform: translateY(-1px);
  }

  .cart-count-badge {
    position: absolute;
    top: -10px;
    right: -10px;
    background: #040604;
    color: var(--accent-strong);
    border: 1px solid var(--accent);
    border-radius: 999px;
    min-width: 24px;
    height: 24px;
    display: grid;
    place-items: center;
    font-size: 0.75rem;
    font-weight: 800;
    padding: 0 6px;
  }

  .cart-count-badge.hidden {
    display: none;
  }

  @media (max-width: 860px) {
    .reyval-nav { display: none; }
  }
</style>

<header class="reyval-header">
  <div class="reyval-header-inner">
    <a href="home.html" class="reyval-brand">
      <img src="REYVAL.png" alt="Reyval" class="reyval-logo" style="width: 3rem; height: 3rem; object-fit: contain;">
      <span>Reyval</span>
    </a>

    <nav class="reyval-nav">
      <a href="home.html" class="nav-item">Home</a>
      <a href="home.html?category=men" class="nav-item">Men</a>
      <a href="home.html?category=women" class="nav-item">Women</a>
      <a href="home.html?category=kids" class="nav-item">Kids</a>
      <a href="home.html?category=accessories" class="nav-item">Accessories</a>
    </nav>

    <a href="cart.html" class="cart-button">
      <span>🛒</span>
      <span>Bag</span>
      <span id="cart-count-badge" class="cart-count-badge hidden">0</span>
    </a>
  </div>
</header>

<div style="margin-top: 92px;"></div>
