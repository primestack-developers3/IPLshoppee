<style>
  :root {
    --bg: rgba(7, 10, 8, 0.96);
    --surface: rgba(16, 28, 24, 0.95);
    --border: rgba(212, 175, 55, 0.18);
    --accent: #d4af37;
    --text: #f8f3e9;
    --muted: rgba(248, 243, 233, 0.7);
  }

  .reyval-cart-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(12px);
    z-index: 999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }

  .reyval-cart-overlay.show {
    opacity: 1;
    pointer-events: auto;
  }

  .reyval-cart-panel {
    position: fixed;
    right: 0;
    top: 0;
    height: 100vh;
    width: min(480px, 100%);
    background: var(--surface);
    backdrop-filter: blur(22px);
    border-left: 1px solid var(--border);
    z-index: 1000;
    transform: translateX(110%);
    transition: transform 0.32s ease;
    display: flex;
    flex-direction: column;
    box-shadow: -20px 0 70px rgba(0, 0, 0, 0.45);
  }

  .reyval-cart-panel.open {
    transform: translateX(0);
  }

  .reyval-cart-header {
    padding: 1.6rem 1.6rem 1.2rem;
    border-bottom: 1px solid rgba(212, 175, 55, 0.12);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .reyval-cart-header h2 {
    margin: 0;
    color: var(--text);
    font-size: 1.55rem;
    font-weight: 900;
  }

  .reyval-cart-close {
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(212, 175, 55, 0.12);
    color: var(--text);
    width: 2.8rem;
    height: 2.8rem;
    border-radius: 1rem;
    display: grid;
    place-items: center;
    cursor: pointer;
    transition: all 0.25s ease;
  }

  .reyval-cart-close:hover {
    transform: rotate(90deg);
    background: rgba(212, 175, 55, 0.14);
  }

  .reyval-cart-items {
    flex: 1;
    overflow-y: auto;
    padding: 1.4rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .reyval-cart-item {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 1.45rem;
    padding: 1.25rem;
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    align-items: center;
  }

  .reyval-cart-item-info {
    flex: 1;
  }

  .reyval-cart-item-name {
    color: var(--text);
    font-weight: 800;
    margin-bottom: 0.35rem;
  }

  .reyval-cart-item-price {
    color: var(--muted);
    font-size: 0.95rem;
  }

  .reyval-cart-item-controls {
    display: flex;
    align-items: center;
    gap: 0.55rem;
    flex-wrap: wrap;
  }

  .reyval-qty-btn {
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: var(--text);
    width: 2.4rem;
    height: 2.4rem;
    border-radius: 0.85rem;
    cursor: pointer;
    font-weight: 800;
    transition: all 0.2s ease;
  }

  .reyval-qty-btn:hover {
    background: rgba(212, 175, 55, 0.14);
  }

  .reyval-qty-display {
    min-width: 2.2rem;
    text-align: center;
    font-weight: 700;
    color: var(--text);
  }

  .reyval-cart-remove {
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(239, 68, 68, 0.25);
    color: #fbc8c2;
    padding: 0.5rem 0.9rem;
    border-radius: 0.85rem;
    cursor: pointer;
    font-size: 0.82rem;
    font-weight: 700;
    transition: all 0.2s ease;
  }

  .reyval-cart-remove:hover {
    background: rgba(239, 68, 68, 0.2);
  }

  .reyval-cart-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: var(--muted);
    gap: 1rem;
    padding: 2rem;
  }

  .reyval-cart-empty-icon {
    font-size: 3rem;
    opacity: 0.35;
  }

  .reyval-cart-footer {
    padding: 1.5rem;
    border-top: 1px solid rgba(212, 175, 55, 0.12);
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .reyval-cart-summary {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(212, 175, 55, 0.08);
    border: 1px solid rgba(212, 175, 55, 0.12);
    border-radius: 1rem;
    padding: 1rem 1.2rem;
  }

  .reyval-cart-summary span {
    color: var(--text);
    font-weight: 700;
  }

  .reyval-cart-total {
    color: var(--text);
    font-size: 1.85rem;
    font-weight: 900;
  }

  .reyval-cart-actions {
    display: flex;
    gap: 0.85rem;
    flex-wrap: wrap;
  }

  .reyval-checkout-btn,
  .reyval-clear-cart-btn {
    flex: 1;
    min-width: 140px;
    padding: 0.95rem 1rem;
    border-radius: 1rem;
    font-weight: 800;
    cursor: pointer;
    transition: transform 0.2s ease, background-color 0.2s ease;
    border: none;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }

  .reyval-checkout-btn {
    background: linear-gradient(135deg, #d4af37, #f3e8c1);
    color: #040604;
  }

  .reyval-checkout-btn:hover {
    transform: translateY(-1px);
  }

  .reyval-clear-cart-btn {
    background: rgba(255, 255, 255, 0.08);
    color: var(--text);
    border: 1px solid rgba(255, 255, 255, 0.12);
  }

  .reyval-clear-cart-btn:hover {
    background: rgba(255, 255, 255, 0.12);
  }

  .reyval-cart-items::-webkit-scrollbar {
    width: 7px;
  }

  .reyval-cart-items::-webkit-scrollbar-track {
    background: transparent;
  }

  .reyval-cart-items::-webkit-scrollbar-thumb {
    background: rgba(212, 175, 55, 0.28);
    border-radius: 999px;
  }

  @media (max-width: 768px) {
    .reyval-cart-panel {
      width: 100%;
    }
  }
</style>

<div class="reyval-cart-overlay" id="cartOverlay" onclick="closeCartPanel()"></div>
<div class="reyval-cart-panel" id="cartPanel">
  <div class="reyval-cart-header">
    <h2>🛒 Your Bag</h2>
    <button class="reyval-cart-close" onclick="closeCartPanel()">✕</button>
  </div>

  <div class="reyval-cart-items" id="cartItemsContainer"></div>

  <div class="reyval-cart-footer">
    <div class="reyval-cart-summary">
      <span>Total</span>
      <span class="reyval-cart-total">₹<span id="cartTotalPrice">0</span></span>
    </div>
    <div class="reyval-cart-actions">
      <button class="reyval-checkout-btn" onclick="proceedToCheckout()">Checkout</button>
      <button class="reyval-clear-cart-btn" onclick="clearAllCart()">Clear Bag</button>
    </div>
  </div>
</div>

<script>
  function openCartPanel() {
    const panel = document.getElementById('cartPanel');
    const overlay = document.getElementById('cartOverlay');
    if (panel && overlay) {
      panel.classList.add('open');
      overlay.classList.add('show');
      updateCartDisplay();
    }
  }

  function closeCartPanel() {
    const panel = document.getElementById('cartPanel');
    const overlay = document.getElementById('cartOverlay');
    if (panel && overlay) {
      panel.classList.remove('open');
      overlay.classList.remove('show');
    }
  }

  function updateCartDisplay() {
    const cart = getCart();
    const container = document.getElementById('cartItemsContainer');
    if (!container) return;

    if (cart.length === 0) {
      container.innerHTML = `
        <div class="reyval-cart-empty">
          <div class="reyval-cart-empty-icon">🛍️</div>
          <div>Your bag is empty</div>
          <button onclick="closeCartPanel()" class="reyval-clear-cart-btn" style="width:auto;">Continue Shopping</button>
        </div>`;
      return;
    }

    let itemsHTML = '';
    let total = 0;
    cart.forEach(item => {
      const itemTotal = item.price * (item.quantity || 1);
      total += itemTotal;
      itemsHTML += `
        <div class="reyval-cart-item">
          <div class="reyval-cart-item-info">
            <div class="reyval-cart-item-name">${item.name}</div>
            <div class="reyval-cart-item-price">₹${item.price} × ${item.quantity || 1}</div>
          </div>
          <div class="reyval-cart-item-controls">
            <button class="reyval-qty-btn" onclick="updateQuantity('${item.id}', ${(item.quantity || 1) - 1})">−</button>
            <span class="reyval-qty-display">${item.quantity || 1}</span>
            <button class="reyval-qty-btn" onclick="updateQuantity('${item.id}', ${(item.quantity || 1) + 1})">+</button>
            <button class="reyval-cart-remove" onclick="removeFromCart('${item.id}')">Remove</button>
          </div>
        </div>`;
    });

    container.innerHTML = itemsHTML;
    const priceEl = document.getElementById('cartTotalPrice');
    if (priceEl) priceEl.textContent = total;
  }

  function proceedToCheckout() {
    const cart = getCart();
    if (cart.length === 0) {
      alert('Your cart is empty!');
      return;
    }
    window.location.href = './checkout.html';
  }

  window.addEventListener('cartUpdated', updateCartDisplay);
</script>
