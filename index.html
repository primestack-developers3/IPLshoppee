<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="6SaLofNa9pbyuBO3HUbdR1Cl2OVT5sYYFptJ5D-DjAM" />
    <title>Login | Reyval</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #040604;
            overflow: hidden;
            color: #f8f3e9;
        }
        .stadium-glow {
            background: radial-gradient(circle at center, rgba(212, 175, 55, 0.3) 0%, transparent 70%);
            opacity: 0.45;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(22px);
            border: 1px solid rgba(212, 175, 55, 0.16);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-up { animation: slideUp 0.6s ease-out forwards; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen text-white">

    <div class="fixed inset-0 stadium-glow pointer-events-none"></div>

    <div class="relative z-10 w-full max-w-md px-6">
        <div class="login-card p-10 rounded-[3rem] shadow-2xl animate-up text-center">
            <!-- Logo -->
            <div class="flex flex-col items-center mb-10">
                    <img src="REYVAL.png" alt="Reyval" class="w-16 h-16 rounded-2xl shadow-2xl shadow-[#d4af37]/30 mb-4 object-cover">
                    <h1 class="text-3xl font-black italic tracking-tighter uppercase leading-none">Reyval</h1>
                    <p class="text-[#d4af37]/80 font-bold text-[10px] tracking-[0.3em] uppercase mt-3">Exclusive login for luxury fashion</p>
            <div class="space-y-6">
                <p class="text-[#f8f3e9]/80 text-sm leading-relaxed">Authenticate with Google to access your Reyval wardrobe, track orders, and continue shopping.</p>
                
                <button id="googleBtn" class="w-full bg-[#d4af37] text-[#040604] font-black py-4 rounded-2xl text-sm tracking-widest uppercase shadow-xl hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-3">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/><path fill="#FF3D00" d="m6.306 14.691 6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/><path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/></svg>
                    Continue with Google
                </button>
            </div>

            <div class="mt-10 pt-8 border-t border-white/5">
                <p class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-600">Secure 256-bit Encryption</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signInWithCustomToken, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Your web app's Firebase configuration
        const firebaseConfig = {
          apiKey: "AIzaSyDGZQUXhcEOrdVw8jc2QFnnNm9b-o1BGnc",
          authDomain: "ipl-fanbase-shopee.firebaseapp.com",
          projectId: "ipl-fanbase-shopee",
          storageBucket: "ipl-fanbase-shopee.firebasestorage.app",
          messagingSenderId: "174418005921",
          appId: "1:174418005921:web:21a22cc6712c0ab78585e0",
          measurementId: "G-XPXDF4KW7N"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // auto-redirect if already signed in
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = 'home.html';
            }
        });

        const googleBtn = document.getElementById('googleBtn');

        googleBtn.addEventListener('click', async () => {
            try {
                googleBtn.disabled = true;
                googleBtn.innerText = "Authenticating...";
                
                // In production environment, we use the custom token if available
                if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
                    await signInWithCustomToken(auth, window.__initial_auth_token);
                } else {
                    // Standard Firebase Auth for standalone usage
                    await signInWithPopup(auth, provider);
                }
                
                window.location.href = 'home.html';
            } catch (error) {
                console.error("Auth Error:", error);
                googleBtn.disabled = false;
                googleBtn.innerText = "Retry Google Login";
                alert("Login Failed. Please try again.");
            }
        });
    </script>
</body>
</html>
