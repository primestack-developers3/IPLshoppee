<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL PRO | Official Fan Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #0a0a0c;
            color: #f1f5f9;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .nav-blur {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
        }

        .view-section {
            display: none;
            animation: fadeIn 0.5s ease-out;
        }
        .view-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-gradient {
            background: radial-gradient(circle at top right, rgba(59, 130, 246, 0.15), transparent);
        }

        .toast-notification {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #2563eb;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            font-weight: 800;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            transform: translateY(100px);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }
        .toast-notification.show {
            transform: translateY(0);
        }
    </style>
</head>
<body class="selection:bg-blue-500/30">

    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 nav-blur border-b border-white/5 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3 cursor-pointer" onclick="showView('home')">
            <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-xl flex items-center justify-center shadow-lg shadow-blue-900/20">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
            </div>
            <h1 class="text-xl font-black tracking-tighter">IPL <span class="text-blue-500">PRO</span></h1>
        </div>

        <div class="hidden lg:flex items-center gap-8 text-xs font-bold uppercase tracking-widest text-slate-400">
            <button onclick="showView('home')" class="nav-link hover:text-white transition-colors" data-view="home">Home</button>
            <button onclick="showView('shop')" class="nav-link hover:text-white transition-colors" data-view="shop">Collections</button>
            <button onclick="showView('shipping')" class="nav-link hover:text-white transition-colors" data-view="shipping">Shipping</button>
            <button onclick="showView('contact')" class="nav-link hover:text-white transition-colors" data-view="contact">Contact</button>
        </div>

        <div class="flex items-center gap-3">
            <button onclick="showView('cart')" class="relative p-2 hover:bg-white/5 rounded-full transition-all group mr-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="group-hover:scale-110 transition-transform"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                <span id="cart-count" class="hidden absolute -top-1 -right-1 bg-red-600 text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full border-2 border-black">0</span>
            </button>
            
            <!-- User Profile Section -->
            <div id="user-profile" class="flex items-center gap-3 pl-3 border-l border-white/10">
                <div class="text-right hidden sm:block">
                    <p id="user-name" class="text-[10px] font-black uppercase tracking-widest text-white leading-none">Loading...</p>
                    <button onclick="handleLogout()" class="text-[9px] font-bold text-slate-500 hover:text-red-500 uppercase tracking-tighter">Sign Out</button>
                </div>
                <div id="user-avatar" class="w-9 h-9 rounded-full bg-blue-600/20 border border-white/10 overflow-hidden flex items-center justify-center text-xs font-bold">
                    ?
                </div>
            </div>
        </div>
    </nav>

    <!-- VIEWS -->
    <main class="pt-24 min-h-[80vh]">
        <!-- [Home, Shop, Cart, Policy sections same as before] -->
        <section id="view-home" class="view-section active">
             <div class="px-6 mb-20">
                <div class="max-w-7xl mx-auto relative rounded-[3rem] overflow-hidden bg-gradient-to-br from-blue-900/40 via-slate-900 to-black p-12 md:p-24 border border-white/5 hero-gradient">
                    <div class="relative z-10 max-w-2xl space-y-8">
                        <div class="inline-flex items-center gap-2 px-4 py-2 bg-blue-500/10 border border-blue-500/20 rounded-full text-blue-400 text-[10px] font-black tracking-[0.2em] uppercase">
                            <span class="animate-pulse">🔥</span> Trending Season '24
                        </div>
                        <h1 class="text-6xl md:text-8xl font-black italic leading-[0.85] tracking-tighter uppercase">
                            City Pride. <br /> <span class="text-blue-500">Official</span> <br /> Gear.
                        </h1>
                        <p class="text-slate-400 text-lg md:text-xl font-medium max-w-lg leading-relaxed">
                            Welcome back to the Dugout. Official merchandise from all 10 IPL franchises delivered to your doorstep.
                        </p>
                        <div class="flex flex-wrap gap-4 pt-4">
                            <button onclick="showView('shop')" class="bg-white text-black px-10 py-5 rounded-2xl font-black flex items-center gap-3 hover:scale-105 transition-all uppercase">
                                Shop All Teams 
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="px-6 mb-24 max-w-7xl mx-auto">
                <h2 class="text-4xl font-black italic tracking-tighter mb-12 uppercase">Most Sold Products</h2>
                <div id="trending-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
            </div>
        </section>

        <!-- Dynamic Shop Section -->
        <section id="view-shop" class="view-section">
            <div class="max-w-7xl mx-auto px-6">
                <div id="team-filter" class="flex overflow-x-auto gap-4 pb-8 no-scrollbar"></div>
                <div id="shop-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-20"></div>
            </div>
        </section>

        <!-- Cart and Policy containers -->
        <section id="view-cart" class="view-section">
            <div class="max-w-4xl mx-auto px-6 py-10" id="cart-container">
                <h2 class="text-4xl font-black italic mb-8 uppercase">The Dugout</h2>
                <div id="cart-items" class="space-y-6"></div>
                <div id="cart-empty" class="hidden text-center py-20 bg-white/5 rounded-[3rem] border border-dashed border-white/10">
                    <p class="text-slate-500 font-bold uppercase">Your dugout is empty</p>
                </div>
                <div id="cart-summary" class="hidden mt-10 p-10 bg-white text-black rounded-[3rem] flex items-center justify-between">
                     <p id="total-price" class="text-4xl font-black italic">₹0</p>
                     <button onclick="processCheckout()" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black uppercase">Checkout</button>
                </div>
            </div>
        </section>

        <section id="view-policy" class="view-section">
            <div class="max-w-4xl mx-auto px-6 py-12">
                <div class="bg-white/5 border border-white/10 p-12 rounded-[3rem] space-y-8" id="policy-content"></div>
            </div>
        </section>
    </main>

    <div id="toast" class="toast-notification">Added to Dugout! 🏏</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, signInWithCustomToken, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Firebase Initialization
        const firebaseConfig = {
          apiKey: "AIzaSyDGZQUXhcEOrdVw8jc2QFnnNm9b-o1BGnc",
          authDomain: "ipl-fanbase-shopee.firebaseapp.com",
          projectId: "ipl-fanbase-shopee",
          storageBucket: "ipl-fanbase-shopee.firebasestorage.app",
          messagingSenderId: "174418005921",
          appId: "1:174418005921:web:21a22cc6712c0ab78585e0",
          measurementId: "G-XPXDF4KW7N"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // State & Data
        let cart = [];
        let activeTeamId = 'csk';

        const persistCart = () => {
            localStorage.setItem('ipl_cart', JSON.stringify(cart));
        };

        const loadCart = () => {
            const stored = localStorage.getItem('ipl_cart');
            if (stored) {
                try {
                    cart = JSON.parse(stored);
                } catch (error) {
                    cart = [];
                    console.warn('Invalid cart state in localStorage, resetting cart.');
                }
            }
        };

        const TEAMS = [{ id: 'csk', name: 'Chennai Super Kings', color: '#F9CD05', logo: '🦁' },{ id: 'rcb', name: 'Royal Challengers Bengaluru', color: '#E21C23', logo: '🐅' },{ id: 'mi', name: 'Mumbai Indians', color: '#004BA0', logo: '🌀' },{ id: 'kkr', name: 'Kolkata Knight Riders', color: '#3A225D', logo: '⚔️' },{ id: 'rr', name: 'Rajasthan Royals', color: '#EA1A85', logo: '🏰' },{ id: 'srh', name: 'Sunrisers Hyderabad', color: '#FF822E', logo: '🦅' },{ id: 'gt', name: 'Gujarat Titans', color: '#1B2133', logo: '⚡' },{ id: 'lsg', name: 'Lucknow Super Giants', color: '#0057E7', logo: '🕊️' },{ id: 'dc', name: 'Delhi Capitals', color: '#000080', logo: '🐅' },{ id: 'pbks', name: 'Punjab Kings', color: '#ED1B24', logo: '🦁' }];
        const MERCH = [{ id: 'jersey', name: 'Jersey', price: 1999, img: '👕' },{ id: 'cap', name: 'Cap', price: 799, img: '🧢' },{ id: 'hoodie', name: 'Hoodie', price: 2999, img: '🧥' }];
        const TRENDING = [{ id: 't1', teamId: 'csk', name: 'Classic Jersey', price: 1999, img: '👕', sales: '18k+' },{ id: 't2', teamId: 'rcb', name: 'Red Hoodie', price: 2999, img: '🧥', sales: '10k+' },{ id: 't3', teamId: 'mi', name: 'Official Cap', price: 799, img: '🧢', sales: '14k+' },{ id: 't4', teamId: 'gt', name: 'Training Tee', price: 1299, img: '👕', sales: '7k+' }];

        // Auth Guardian
        const initAuth = async () => {
            if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
                await signInWithCustomToken(auth, window.__initial_auth_token);
            }
        };
        initAuth();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('user-name').innerText = user.displayName || 'Fan Pro';
                const avatar = document.getElementById('user-avatar');
                if (user.photoURL) {
                    avatar.innerHTML = `<img src="${user.photoURL}" class="w-full h-full object-cover">`;
                } else {
                    avatar.innerText = (user.displayName || 'F').charAt(0).toUpperCase();
                }
            } else {
                window.location.href = 'index.html';
            }
        });

        window.handleLogout = async () => {
            await signOut(auth);
            window.location.href = 'index.html';
        };

        // Logic (Exposed to global window for HTML onclicks)
        window.showView = (viewId) => {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById(`view-${viewId}`).classList.add('active');
            if(viewId === 'shop') renderShop();
            if(viewId === 'cart') renderCart();
            if(viewId === 'home') renderHome();
        };

        const renderHome = () => {
            const grid = document.getElementById('trending-grid');
            grid.innerHTML = TRENDING.map(p => `
                <div class="bg-white/5 border border-white/5 rounded-[2.5rem] p-8 text-center group">
                    <div class="text-7xl mb-6 group-hover:scale-110 transition-transform">${p.img}</div>
                    <p class="text-[10px] font-black text-slate-500 uppercase">${p.sales} Sold</p>
                    <h3 class="text-xl font-bold">${p.name}</h3>
                    <div class="flex items-center justify-between mt-6">
                        <span class="text-2xl font-black">₹${p.price}</span>
                        <button onclick="addToCart('${p.id}', '${p.teamId}')" class="w-10 h-10 bg-white text-black rounded-xl font-bold">+</button>
                    </div>
                </div>`).join('');
        };

        const renderShop = () => {
             const filter = document.getElementById('team-filter');
            filter.innerHTML = TEAMS.map(t => `
                <button onclick="setActiveTeam('${t.id}')" class="flex-shrink-0 px-6 py-3 rounded-xl border ${activeTeamId === t.id ? 'bg-white/10 border-white/20' : 'opacity-40 border-transparent'}">
                    <span class="font-bold text-xs uppercase">${t.id}</span>
                </button>
            `).join('');

            const grid = document.getElementById('shop-grid');
            const team = TEAMS.find(t => t.id === activeTeamId);
            grid.innerHTML = MERCH.map(m => `
                <div class="bg-white/5 border border-white/5 rounded-[2.5rem] p-10 text-center">
                    <div class="text-8xl mb-6">${m.img}</div>
                    <h3 class="text-2xl font-bold uppercase">${team.id} ${m.name}</h3>
                    <div class="flex items-center justify-between mt-8">
                        <span class="text-3xl font-black">₹${m.price}</span>
                        <button onclick="addToCart('${m.id}', '${team.id}')" class="bg-white text-black px-6 py-3 rounded-xl font-bold">ADD</button>
                    </div>
                </div>`).join('');
        };

        window.setActiveTeam = (id) => { activeTeamId = id; renderShop(); };

        window.addToCart = (itemId, teamId) => {
            const itemBase = TRENDING.find(p => p.id === itemId) || MERCH.find(m => m.id === itemId);
            cart.push({...itemBase, cartId: Date.now()});
            persistCart();
            updateCartCount();
            showToast();
        };

        const updateCartCount = () => {
            const el = document.getElementById('cart-count');
            el.innerText = cart.length;
            el.classList.toggle('hidden', cart.length === 0);
        };

        const renderCart = () => {
            const itemsEl = document.getElementById('cart-items');
            const emptyEl = document.getElementById('cart-empty');
            const summaryEl = document.getElementById('cart-summary');
            if(cart.length === 0) { itemsEl.innerHTML = ''; emptyEl.classList.remove('hidden'); summaryEl.classList.add('hidden'); return; }
            emptyEl.classList.add('hidden'); summaryEl.classList.remove('hidden');
            itemsEl.innerHTML = cart.map(item => `<div class="bg-white/5 p-6 rounded-2xl flex items-center justify-between"><div><p class="font-bold">${item.name}</p><p class="text-xl font-black">₹${item.price}</p></div><button onclick="removeFromCart(${item.cartId})" class="text-red-500 font-bold uppercase text-xs">Remove</button></div>`).join('');
            const total = cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('total-price').innerText = `₹${(total * 1.18).toFixed(0)}`;
        };

        window.removeFromCart = (cid) => { cart = cart.filter(i => i.cartId !== cid); persistCart(); renderCart(); updateCartCount(); };
        const showToast = () => { const t = document.getElementById('toast'); t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); };
        window.processCheckout = () => { alert('Order Placed!'); cart = []; persistCart(); updateCartCount(); showView('home'); };

        window.onload = () => {
            loadCart();
            updateCartCount();
            renderHome();
        };
    </script>
</body>
</html>
