<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reyval Personal Stylist</title>
    <link rel="stylesheet" href="styles/stylist.css">
</head>
<body>
    <!-- Include Header -->
    <div w3-include-html="components/header.html"></div>

    <div style="margin-top: 92px;"></div>

    <br><br><br><br> <div class="stylist-container">
        <header class="stylist-header">
            <h1>Reyval Personal Stylist</h1>
            <p>Your royal fashion advisor awaits</p>
        </header>
        
        <div class="chat-container">
            <div id="chat-messages" class="chat-messages">
                <div class="message bot-message">
                    <div class="message-content">
                        <p>Welcome to Reyval, Your Royal Highness. I am your personal fashion stylist. Allow me to curate the perfect ensemble for your occasion. Shall we begin?</p>
                    </div>
                </div>
            </div>
            
            <div class="chat-input-container">
                <input type="text" id="chat-input" placeholder="Type your response..." disabled>
                <button id="mic-btn" class="mic-btn">🎤</button>
                <button id="send-btn" class="send-btn" disabled>Send</button>
            </div>
        </div>
    </div>

    <!-- Include Footer -->
    <div w3-include-html="components/footer.html"></div>

    <script src="data/reyval-catalog.js"></script>
    <script src="scripts/stylist-chatbot-new.js"></script>
    <script>
        // Include HTML components
        function includeHTML() {
            var z, i, elmnt, file, xhttp;
            z = document.getElementsByTagName("*");
            for (i = 0; i < z.length; i++) {
                elmnt = z[i];
                file = elmnt.getAttribute("w3-include-html");
                if (file) {
                    xhttp = new XMLHttpRequest();
                    xhttp.onreadystatechange = function() {
                        if (this.readyState == 4) {
                            if (this.status == 200) {elmnt.innerHTML = this.responseText;}
                            if (this.status == 404) {elmnt.innerHTML = "Page not found.";}
                            elmnt.removeAttribute("w3-include-html");
                            includeHTML();
                        }
                    }
                    xhttp.open("GET", file, true);
                    xhttp.send();
                    return;
                }
            }
        }
        includeHTML();
    </script>
</body>
</html>
